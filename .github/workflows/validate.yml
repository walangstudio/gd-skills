name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin structure
        run: |
          chmod +x scripts/validate-plugin.sh
          bash scripts/validate-plugin.sh

      - name: Validate cross-references
        run: |
          chmod +x scripts/validate-references.sh
          bash scripts/validate-references.sh

      - name: Verify checksums are up to date
        run: |
          if [ -f CHECKSUMS.sha256 ]; then
            echo "Regenerating checksums and comparing..."
            cp CHECKSUMS.sha256 CHECKSUMS.sha256.committed
            chmod +x scripts/regenerate-checksums.sh
            bash scripts/regenerate-checksums.sh
            if ! diff -q CHECKSUMS.sha256.committed CHECKSUMS.sha256 > /dev/null 2>&1; then
              echo "ERROR: CHECKSUMS.sha256 is out of date."
              echo "Run 'bash scripts/regenerate-checksums.sh' and commit the result."
              echo ""
              diff CHECKSUMS.sha256.committed CHECKSUMS.sha256 || true
              exit 1
            fi
            echo "Checksums are up to date."
            rm -f CHECKSUMS.sha256.committed
          else
            echo "No CHECKSUMS.sha256 found, skipping."
          fi

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            agents/*.md
            commands/*.md
            rules/*.md
            skills/**/*.md
            contexts/*.md
        continue-on-error: true

      - name: Check for broken links in README
        run: |
          echo "Checking README references..."
          errors=0

          # Verify all backtick-wrapped slash commands: `/command-name`
          for cmd in $(tr -d '\r' < README.md | grep -oP '(?<=`/)[a-z]+-[a-z-]+(?=`)' | sort -u); do
            if [ ! -f "commands/$cmd.md" ]; then
              echo "ERROR: README references /$cmd but commands/$cmd.md does not exist"
              errors=$((errors + 1))
            fi
          done

          # Verify all backtick-wrapped agent names
          for agent in $(tr -d '\r' < README.md | grep -oP '(?<=`)[a-z]+-[a-z-]*(?:specialist|builder|master|debugger|architect)(?=`)' | sort -u); do
            if [ ! -f "agents/$agent.md" ]; then
              echo "ERROR: README references agent $agent but agents/$agent.md does not exist"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -eq 0 ]; then
            echo "All README references valid."
          else
            echo "$errors error(s) found."
            exit 1
          fi
